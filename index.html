<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toDo</title>
    <link rel="stylesheet" href="estilos.css">
    <script defer src="notas.js"></script>
    <script defer src="theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header>
            <div class="logo">M-Genes</div>
            <div class="actions">
                <div class="add">+</div>
                <div class="toggleTheme"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M280-240q-100 0-170-70T40-480q0-100 70-170t170-70h400q100 0 170 70t70 170q0 100-70 170t-170 70H280Zm0-80h400q66 0 113-47t47-113q0-66-47-113t-113-47H280q-66 0-113 47t-47 113q0 66 47 113t113 47Zm485-75q35-35 35-85t-35-85q-35-35-85-35t-85 35q-35 35-35 85t35 85q35 35 85 35t85-35Zm-285-85Z"/></svg></div>
            </div>
        </header>
    
        <main>

            <div id="modal" class="modal">
                <div class="modal-content">
                    <div class="header-modal">
                        <h2>Crear Nota</h2><span id="closeModal">&times;</span>
                    </div>
                        
                    <input type="text" id="title" placeholder="Título" />
                    <textarea id="content" placeholder="Contenido" rows="6"></textarea>
                    
                    <div class="modal-tags">
                        <div class="tag-icon icon-modal" title="nombreTag"></div>
                    </div>
                    <div class="tag-add">Agregar Tag</div>

                    <div class="crearTag">
                        <input type="text" name="nombreTag" id="nombreTag" placeholder="Nombre del Tag">
                        <div class="color-sel">
                            <div class="sel-color" data-color="#D0F4DE" style="background: #D0F4DE;"></div>
                            <div class="sel-color" data-color="#FCF6BD" style="background: #FCF6BD;"></div>
                            <div class="sel-color" data-color="#FF99C8" style="background: #FF99C8;"></div>
                            <div class="sel-color" data-color="#A9DEF9" style="background: #A9DEF9;"></div>
                            <div class="sel-color" data-color="#E4C1F9" style="background: #E4C1F9;"></div>
                            <div class="sel-color" data-color="#D4A373" style="background: #D4A373;"></div>
                            <div class="sel-color" data-color="#FFD670" style="background: #FFD670;"></div>
                            <div class="sel-color" data-color="#9381FF" style="background: #9381FF;"></div>                                
                        </div>
                        <button id="crearTag">Crear Tag</button>
                    </div>

                    <button id="saveNote">Guardar</button>
                </div>
            </div>
            
            <aside>
                <div class="aside-img"></div>
                <div class="tag-container">
                    <div class="tags">
                    </div>
                </div>
                <div class="cat-patas"></div>
            </aside>
    
            <div class="contenido">
                <div class="tarjetas">
                </div>
            </div>
        </main>
    
        <footer></footer>
    </div>
</body>
</html>
